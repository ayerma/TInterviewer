name: DMtools - Implement dm-creator Tickets

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

  # Triggered by Jira webhook when dm-creator label is added to a ticket.
  # Jira webhook URL: https://api.github.com/repos/ayerma/TInterviewer/dispatches
  # Jira webhook payload: { "event_type": "dm-creator-ticket" }
  # Authorization header: Bearer <PAT with repo scope>
  repository_dispatch:
    types: [dm-creator-ticket]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  implement-tickets:
    runs-on: ubuntu-latest
    concurrency:
      group: dm-creator-implementor
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache DMtools
        id: cache-dmtools
        uses: actions/cache@v4
        with:
          path: ~/.dmtools
          key: dmtools-v1.7.179-${{ runner.os }}

      - name: Install DMtools CLI
        if: steps.cache-dmtools.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/epam/dm.ai/main/install | bash

      - name: Add DMtools to PATH
        run: |
          echo "$HOME/.dmtools/bin" >> $GITHUB_PATH

      - name: Verify DMtools installation
        run: |
          dmtools --version

      - name: Run Teammate - Process dm-creator tickets
        env:
          AGENT_DISABLE_WATCHDOG: "1"
          # Jira
          JIRA_BASE_PATH: ${{ vars.JIRA_BASE_PATH }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_AUTH_TYPE: Basic
          # AI
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEFAULT_LLM: gemini
          DEFAULT_TRACKER: jira
        run: |
          CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "[INFO] Processing dm-reator tickets..."
          dmtools run agents/dm-creator-implementor.json --ciRunUrl "${CI_RUN_URL}"

      - name: Check for generated content
        id: check_files
        run: |
          if [ -d "output/questions" ] && [ "$(ls -A output/questions 2>/dev/null)" ]; then
            echo "has_content=true" >> $GITHUB_OUTPUT
            echo "[INFO] Generated question files found"
          else
            echo "has_content=false" >> $GITHUB_OUTPUT
            echo "[INFO] No new question files generated - nothing to commit"
          fi

      - name: Setup Node.js
        if: steps.check_files.outputs.has_content == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Copy questions to public/data and update spaces-index
        if: steps.check_files.outputs.has_content == 'true'
        run: |
          echo "[INFO] Copying generated question files to public/data/spaces/..."
          cp -r output/questions/spaces/. public/data/spaces/

          if [ -d "output/index-entries" ] && [ "$(ls -A output/index-entries 2>/dev/null)" ]; then
            echo "[INFO] Updating spaces-index.json with new entries..."
            node .github/scripts/update-spaces-index.js
          fi

      - name: Create Pull Request
        if: steps.check_files.outputs.has_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TICKETS=$(ls output/index-entries/*.json 2>/dev/null | xargs -I{} basename {} .json | tr '\n' '_' | sed 's/_$//')
          BRANCH="dm-creator/${TICKETS}-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add public/data/
          git commit -m "feat: add interview questions from dm-creator tickets [skip ci]"
          git push origin "$BRANCH"

          gh pr create --title "feat: Add interview questions from dm-creator tickets" --body "Auto-generated from dm-creator Jira tickets. CI Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" --base main --head "$BRANCH"

          echo "[SUCCESS] Pull request created: $BRANCH"
